<svg width="680" height="288" viewBox="0 0 680 288" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Agent Client Protocol (ACP) 架构图 · 正解</title>
<desc>本节用的 ACP 是 Zed 的 Agent Client Protocol：客户端/宿主(如 OpenClaw 经 ACPX)与编码 Agent(如 Claude Code)之间的标准通道,基于 JSON-RPC 2.0、主传输为本机 stdio 子进程(同一台主机),双向、有状态、初始化时协商能力;像 LSP 但面向 AI 编码 Agent。远程 HTTP/WebSocket 仍在进行中,没有 gRPC/MQTT。</desc>
<style>
text{font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
.t{font-size:14px;font-weight:400;fill:#2C2C2A}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A}
.th{font-size:14px;font-weight:500;fill:#2C2C2A}
.c-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.5}
.c-teal .th,.c-teal .t{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:.5}
.c-purple .th,.c-purple .t{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
.c-coral .th,.c-coral .t{fill:#712B13}.c-coral .ts{fill:#993C1D}
.c-gray{fill:#F1EFE8;stroke:#888780;stroke-width:.5}
.c-gray .th,.c-gray .t{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="288" fill="#ffffff"/>
<text class="th" x="340" y="26" text-anchor="middle">Agent Client Protocol (ACP) 架构图 · 正解</text>
<text class="ts" x="340" y="46" text-anchor="middle">客户端 / 宿主 ⇄ AI 编码 Agent 的标准通道 —— 像 LSP，但面向编码 Agent</text>

<g class="c-teal">
<rect x="24" y="64" width="184" height="132" rx="8"/>
<text class="th" x="116" y="90" text-anchor="middle">客户端 / 宿主</text>
<text class="ts" x="116" y="110" text-anchor="middle">ACP Client</text>
<text class="ts" x="116" y="140" text-anchor="middle">Zed · JetBrains</text>
<text class="ts" x="116" y="164" text-anchor="middle">OpenClaw（经 ACPX）</text>
</g>
<g class="c-coral">
<rect x="248" y="64" width="184" height="132" rx="8"/>
<text class="th" x="340" y="90" text-anchor="middle">ACP 协议</text>
<text class="ts" x="340" y="110" text-anchor="middle">JSON-RPC 2.0</text>
<text class="ts" x="340" y="130" text-anchor="middle">over stdio · 本机子进程</text>
<text class="ts" x="340" y="150" text-anchor="middle">session/new · prompt</text>
<text class="ts" x="340" y="170" text-anchor="middle">双向 · 有状态 · 协商能力</text>
</g>
<g class="c-purple">
<rect x="472" y="64" width="184" height="132" rx="8"/>
<text class="th" x="564" y="90" text-anchor="middle">编码 Agent</text>
<text class="ts" x="564" y="110" text-anchor="middle">ACP Agent</text>
<text class="ts" x="564" y="140" text-anchor="middle">Claude Code · Codex</text>
<text class="ts" x="564" y="164" text-anchor="middle">自带运行时 / 模型 / 工具</text>
</g>

<line x1="210" y1="123" x2="245" y2="123" stroke="#9b9a92" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="245" y1="137" x2="210" y2="137" stroke="#9b9a92" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="434" y1="123" x2="469" y2="123" stroke="#9b9a92" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="469" y1="137" x2="434" y2="137" stroke="#9b9a92" stroke-width="1.4" marker-end="url(#arrow)"/>

<g class="c-gray">
<rect x="24" y="214" width="632" height="58" rx="8"/>
<text class="ts" x="40" y="236" text-anchor="start">传输：本地 stdio 为主；远程 HTTP / WebSocket 仍在进行中（WIP）—— 没有 gRPC / MQTT。</text>
<text class="ts" x="40" y="258" text-anchor="start">本节 = OpenClaw 经 ACPX 在同机把 Claude Code 当子进程拉起，双向 stdio 通信。</text>
</g>
</svg>
