<svg width="680" height="558" viewBox="0 0 680 558" role="img" xmlns="http://www.w3.org/2000/svg">
<title>github-secret-auditor 默认任务流时序图</title>
<desc>用户经飞书触发后,OpenClaw 准备仓库与任务包,通过 ACP 调度通道用 sessions_spawn 启动 Claude Code,Claude Code 巡检修复后回传摘要,OpenClaw 验收;若有缺失则用 sessions_send 循环补漏;验收通过后 OpenClaw 才 commit/push 到 GitHub 并发送飞书报告,最终结果返回用户。</desc>
<style>
text{font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
.t{font-size:14px;font-weight:400;fill:#2C2C2A;stroke:none}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A;stroke:none}
.th{font-size:14px;font-weight:500;fill:#2C2C2A;stroke:none}
.box{fill:#F5F4EF;stroke:#D8D6CC;stroke-width:.5}
.c-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.5}
.c-teal .th,.c-teal .t{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:.5}
.c-purple .th,.c-purple .t{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
.c-coral .th,.c-coral .t{fill:#712B13}.c-coral .ts{fill:#993C1D}
.c-gray{fill:#F1EFE8;stroke:#888780;stroke-width:.5}
.c-gray .th,.c-gray .t{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="558" fill="#ffffff"/>

<text class="ts" x="636" y="66" text-anchor="end" dominant-baseline="central">实线 调用 · 虚线 返回</text>

<line x1="140" y1="54" x2="140" y2="546" stroke="#9b9a92" stroke-width="1" stroke-dasharray="3 4"/>
<line x1="340" y1="54" x2="340" y2="546" stroke="#9b9a92" stroke-width="1" stroke-dasharray="3 4"/>
<line x1="540" y1="54" x2="540" y2="546" stroke="#9b9a92" stroke-width="1" stroke-dasharray="3 4"/>

<g class="c-teal">
<rect x="76" y="20" width="128" height="34" rx="8"/>
<text class="th" x="140" y="32" text-anchor="middle" dominant-baseline="central">OpenClaw</text>
<text class="ts" x="140" y="46" text-anchor="middle" dominant-baseline="central">编排 Agent</text>
</g>
<g class="c-coral">
<rect x="302" y="20" width="76" height="34" rx="8"/>
<text class="th" x="340" y="32" text-anchor="middle" dominant-baseline="central">ACP</text>
<text class="ts" x="340" y="46" text-anchor="middle" dominant-baseline="central">调度通道</text>
</g>
<g class="c-purple">
<rect x="474" y="20" width="132" height="34" rx="8"/>
<text class="th" x="540" y="32" text-anchor="middle" dominant-baseline="central">Claude Code</text>
<text class="ts" x="540" y="46" text-anchor="middle" dominant-baseline="central">执行 Agent</text>
</g>

<rect x="136" y="82" width="8" height="462" rx="2" class="box"/>
<rect x="536" y="214" width="8" height="114" rx="2" class="box"/>
<rect x="536" y="430" width="8" height="22" rx="2" class="box"/>

<circle cx="58" cy="82" r="4" fill="#9b9a92"/>
<line x1="62" y1="82" x2="136" y2="82" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="66" y="74" text-anchor="start" dominant-baseline="central">用户: 巡检 repo_url</text>

<text class="ts" x="44" y="104" text-anchor="start" dominant-baseline="central">① 准备</text>
<g class="c-teal">
<rect x="150" y="96" width="180" height="70" rx="6"/>
<text class="th" x="160" y="110" text-anchor="start" dominant-baseline="central">准备阶段 · 步骤 1–6</text>
<text class="ts" x="160" y="131" text-anchor="start" dominant-baseline="central">确认输入 · clone / pull</text>
<text class="ts" x="160" y="150" text-anchor="start" dominant-baseline="central">生成任务包 (task.json)</text>
</g>
<rect x="150" y="172" width="180" height="22" rx="4" class="box" style="stroke-dasharray:4 3"/>
<text class="ts" x="160" y="183" text-anchor="start" dominant-baseline="central">⛔ 工作区脏 → 返回 failed</text>

<text class="ts" x="44" y="214" text-anchor="start" dominant-baseline="central">② 调度</text>
<line x1="144" y1="214" x2="536" y2="214" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="206" text-anchor="middle" dominant-baseline="central">sessions_spawn(cwd, prompt)</text>

<line x1="536" y1="238" x2="160" y2="238" stroke="#5F5E5A" stroke-width="1.4" stroke-dasharray="5 4"/>
<line x1="160" y1="238" x2="144" y2="238" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="230" text-anchor="middle" dominant-baseline="central">childSessionKey: agent:claude:acp:…</text>

<g class="c-purple">
<rect x="350" y="252" width="184" height="60" rx="6"/>
<text class="th" x="360" y="268" text-anchor="start" dominant-baseline="central">Claude 执行 · 步骤 9</text>
<text class="ts" x="360" y="290" text-anchor="start" dominant-baseline="central">巡检 / 最小修复 / 本地验证</text>
</g>

<line x1="536" y1="328" x2="160" y2="328" stroke="#5F5E5A" stroke-width="1.4" stroke-dasharray="5 4"/>
<line x1="160" y1="328" x2="144" y2="328" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="320" text-anchor="middle" dominant-baseline="central">修改清单 · 风险 · 测试 · diff 摘要</text>

<text class="ts" x="44" y="356" text-anchor="start" dominant-baseline="central">③ 验收</text>
<g class="c-teal">
<rect x="150" y="342" width="180" height="46" rx="6"/>
<text class="th" x="160" y="356" text-anchor="start" dominant-baseline="central">OpenClaw 验收 · 10–13</text>
<text class="ts" x="160" y="376" text-anchor="start" dominant-baseline="central">验收 diff/status · 查 commit</text>
</g>

<rect x="110" y="400" width="470" height="60" rx="6" class="box" style="stroke-dasharray:4 3"/>
<text class="ts" x="118" y="411" text-anchor="start" dominant-baseline="central">loop [验收有缺失项]</text>
<line x1="144" y1="430" x2="536" y2="430" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="424" text-anchor="middle" dominant-baseline="central">sessions_send(上轮 + diff + 缺失项)</text>
<line x1="536" y1="452" x2="160" y2="452" stroke="#5F5E5A" stroke-width="1.4" stroke-dasharray="5 4"/>
<line x1="160" y1="452" x2="144" y2="452" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="446" text-anchor="middle" dominant-baseline="central">重新输出 修改 / 风险 / diff</text>

<text class="ts" x="44" y="486" text-anchor="start" dominant-baseline="central">④ 发布</text>
<path d="M144 480 L176 480 L176 492 L144 492" fill="none" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="184" y="486" text-anchor="start" dominant-baseline="central">→ GitHub: commit / push (仅授权文件)</text>

<path d="M144 512 L176 512 L176 524 L144 524" fill="none" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="184" y="518" text-anchor="start" dominant-baseline="central">→ 飞书: 发送报告 (报告不入库)</text>

<line x1="140" y1="544" x2="78" y2="544" stroke="#5F5E5A" stroke-width="1.4" stroke-dasharray="5 4"/>
<line x1="78" y1="544" x2="62" y2="544" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<text class="ts" x="152" y="544" text-anchor="start" dominant-baseline="central">最终状态 / commit / 风险摘要 → 用户</text>
</svg>
