<svg width="680" height="280" viewBox="0 0 680 280" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ACP 同机边界示意</title>
<desc>OpenClaw(ACP 客户端)与 Claude Code(ACP 智能体)以本机 stdio 子进程方式经 ACP 通信,二者必须位于同一台主机;GitHub 仓库与飞书/用户是远程端点,由 OpenClaw 经网络访问。</desc>
<style>
text{font-family:ui-sans-serif,system-ui,-apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei",sans-serif}
.t{font-size:14px;font-weight:400;fill:#2C2C2A;stroke:none}
.ts{font-size:12px;font-weight:400;fill:#5F5E5A;stroke:none}
.th{font-size:14px;font-weight:500;fill:#2C2C2A;stroke:none}
.box{fill:#F5F4EF;stroke:#D8D6CC;stroke-width:.5}
.c-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.5}
.c-teal .th,.c-teal .t{fill:#085041}.c-teal .ts{fill:#0F6E56}
.c-purple{fill:#EEEDFE;stroke:#534AB7;stroke-width:.5}
.c-purple .th,.c-purple .t{fill:#3C3489}.c-purple .ts{fill:#534AB7}
.c-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.5}
.c-coral .th,.c-coral .t{fill:#712B13}.c-coral .ts{fill:#993C1D}
.c-gray{fill:#F1EFE8;stroke:#888780;stroke-width:.5}
.c-gray .th,.c-gray .t{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect x="0" y="0" width="680" height="280" fill="#ffffff"/>

<rect x="172" y="48" width="448" height="182" rx="10" class="box"/>
<text class="th" x="186" y="66" text-anchor="start" dominant-baseline="central">同一台主机（Ubuntu 服务器）</text>

<g class="c-gray">
<rect x="24" y="92" width="120" height="56" rx="8"/>
<text class="th" x="84" y="112" text-anchor="middle" dominant-baseline="central">飞书 / 用户</text>
<text class="ts" x="84" y="132" text-anchor="middle" dominant-baseline="central">触发 / 报告</text>
</g>
<g class="c-gray">
<rect x="24" y="166" width="120" height="56" rx="8"/>
<text class="th" x="84" y="186" text-anchor="middle" dominant-baseline="central">GitHub 仓库</text>
<text class="ts" x="84" y="206" text-anchor="middle" dominant-baseline="central">clone/pull/push</text>
</g>

<g class="c-teal">
<rect x="196" y="104" width="132" height="64" rx="8"/>
<text class="th" x="262" y="126" text-anchor="middle" dominant-baseline="central">OpenClaw</text>
<text class="ts" x="262" y="148" text-anchor="middle" dominant-baseline="central">ACP 客户端</text>
</g>
<g class="c-coral">
<rect x="360" y="110" width="80" height="52" rx="8"/>
<text class="th" x="400" y="130" text-anchor="middle" dominant-baseline="central">ACP</text>
<text class="ts" x="400" y="148" text-anchor="middle" dominant-baseline="central">本机 stdio</text>
</g>
<g class="c-purple">
<rect x="470" y="104" width="140" height="64" rx="8"/>
<text class="th" x="540" y="126" text-anchor="middle" dominant-baseline="central">Claude Code</text>
<text class="ts" x="540" y="148" text-anchor="middle" dominant-baseline="central">ACP 智能体</text>
</g>

<line x1="330" y1="122" x2="358" y2="122" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="442" y1="122" x2="468" y2="122" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="468" y1="150" x2="442" y2="150" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>
<line x1="358" y1="150" x2="330" y2="150" stroke="#5F5E5A" stroke-width="1.4" marker-end="url(#arrow)"/>

<text class="th" x="330" y="192" text-anchor="middle" dominant-baseline="central">stdio 子进程 · 同机,无网络</text>
<text class="ts" x="540" y="192" text-anchor="middle" dominant-baseline="central">仅本机 · cwd 读写</text>

<line x1="146" y1="118" x2="194" y2="124" stroke="#9b9a92" stroke-width="1.4" stroke-dasharray="5 4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<line x1="146" y1="192" x2="194" y2="156" stroke="#9b9a92" stroke-width="1.4" stroke-dasharray="5 4" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<line x1="44" y1="256" x2="72" y2="256" stroke="#5F5E5A" stroke-width="1.6"/>
<text class="ts" x="78" y="256" text-anchor="start" dominant-baseline="central">本机 stdio · ACP（client 与 agent 同机）</text>
<line x1="360" y1="256" x2="388" y2="256" stroke="#9b9a92" stroke-width="1.6" stroke-dasharray="5 4"/>
<text class="ts" x="394" y="256" text-anchor="start" dominant-baseline="central">网络 · 远程（GitHub / 飞书）</text>
</svg>
